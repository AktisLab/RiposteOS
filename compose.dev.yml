name: riposteos-dev

services:
  object-storage:
    image: chrislusf/seaweedfs:4.29
    command:
      - mini
      - -dir=/data
    environment:
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY:-riposteos}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY:-riposteos-local-secret}
      S3_BUCKET: ${S3_BUCKET:-riposteos-documents}
    ports:
      - '${S3_PORT:-8333}:8333'
    volumes:
      - object_storage_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:9333/cluster/status']
      interval: 2s
      timeout: 3s
      retries: 20

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-riposteos}
      POSTGRES_USER: ${POSTGRES_USER:-riposteos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-riposteos}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-riposteos} -d ${POSTGRES_DB:-riposteos}']
      interval: 2s
      timeout: 3s
      retries: 20

  migrate:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /workspace
    command:
      - /bin/sh
      - -c
      - >-
        dotnet tool restore &&
        dotnet restore RiposteOS.slnx --artifacts-path /tmp/artifacts &&
        dotnet ef database update
        --project src/RiposteOS.Infrastructure
        --startup-project src/RiposteOS.Api
    environment:
      ArtifactsPath: /tmp/artifacts
      UseArtifactsOutput: 'true'
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=${POSTGRES_DB:-riposteos};Username=${POSTGRES_USER:-riposteos};Password=${POSTGRES_PASSWORD:-riposteos}
      ObjectStorage__ServiceUrl: http://object-storage:8333
      ObjectStorage__BucketName: ${S3_BUCKET:-riposteos-documents}
      ObjectStorage__Region: us-east-1
      ObjectStorage__ForcePathStyle: 'true'
      ObjectStorage__AccessKey: ${S3_ACCESS_KEY:-riposteos}
      ObjectStorage__SecretKey: ${S3_SECRET_KEY:-riposteos-local-secret}
      Docling__BaseUrl: http://docling:5001/
    volumes:
      - .:/workspace
      - nuget_packages:/root/.nuget/packages
    depends_on:
      postgres:
        condition: service_healthy

  test:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /workspace
    command:
      - /bin/sh
      - -c
      - >-
        dotnet restore RiposteOS.slnx --artifacts-path /tmp/artifacts &&
        dotnet test RiposteOS.slnx --no-restore
    environment:
      ArtifactsPath: /tmp/artifacts
      UseArtifactsOutput: 'true'
      DOCKER_HOST: unix:///var/run/docker.sock
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - .:/workspace
      - nuget_packages:/root/.nuget/packages
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    init: true
    working_dir: /workspace/src/RiposteOS.Api
    command:
      - dotnet
      - watch
      - --non-interactive
      - --artifacts-path
      - /tmp/artifacts
      - run
      - --no-launch-profile
      - --urls
      - http://0.0.0.0:8080
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: '1'
      DOTNET_WATCH_SUPPRESS_LAUNCH_BROWSER: '1'
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=${POSTGRES_DB:-riposteos};Username=${POSTGRES_USER:-riposteos};Password=${POSTGRES_PASSWORD:-riposteos}
      ObjectStorage__ServiceUrl: http://object-storage:8333
      ObjectStorage__BucketName: ${S3_BUCKET:-riposteos-documents}
      ObjectStorage__Region: us-east-1
      ObjectStorage__ForcePathStyle: 'true'
      ObjectStorage__AccessKey: ${S3_ACCESS_KEY:-riposteos}
      ObjectStorage__SecretKey: ${S3_SECRET_KEY:-riposteos-local-secret}
      Docling__BaseUrl: http://docling:5001/
      AiSecrets__DataProtectionKeyPath: /var/lib/riposteos/data-protection-keys
    ports:
      - '${API_PORT:-8080}:8080'
    volumes:
      - .:/workspace
      - nuget_packages:/root/.nuget/packages
      - ai_data_protection_keys:/var/lib/riposteos/data-protection-keys
    depends_on:
      migrate:
        condition: service_completed_successfully
      object-storage:
        condition: service_healthy

  worker:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    init: true
    working_dir: /workspace/src/RiposteOS.Worker
    command:
      - dotnet
      - watch
      - --non-interactive
      - --artifacts-path
      - /tmp/artifacts
      - run
      - --no-launch-profile
    environment:
      DOTNET_ENVIRONMENT: Development
      DOTNET_USE_POLLING_FILE_WATCHER: '1'
      ConnectionStrings__Database: Host=postgres;Port=5432;Database=${POSTGRES_DB:-riposteos};Username=${POSTGRES_USER:-riposteos};Password=${POSTGRES_PASSWORD:-riposteos}
      ObjectStorage__ServiceUrl: http://object-storage:8333
      ObjectStorage__BucketName: ${S3_BUCKET:-riposteos-documents}
      ObjectStorage__Region: us-east-1
      ObjectStorage__ForcePathStyle: 'true'
      ObjectStorage__AccessKey: ${S3_ACCESS_KEY:-riposteos}
      ObjectStorage__SecretKey: ${S3_SECRET_KEY:-riposteos-local-secret}
      Docling__BaseUrl: http://docling:5001/
      AiSecrets__DataProtectionKeyPath: /var/lib/riposteos/data-protection-keys
    volumes:
      - .:/workspace
      - nuget_packages:/root/.nuget/packages
      - ai_data_protection_keys:/var/lib/riposteos/data-protection-keys
    depends_on:
      migrate:
        condition: service_completed_successfully
      object-storage:
        condition: service_healthy

  web:
    build:
      context: web
      dockerfile: Dockerfile.dev
    init: true
    command:
      - /bin/sh
      - -c
      - pnpm install --frozen-lockfile && exec pnpm dev
    environment:
      API_PROXY_TARGET: http://api:8080
      CI: 'true'
    ports:
      - '${WEB_PORT:-5173}:5173'
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api

  docling:
    image: quay.io/docling-project/docling-serve:v1.26.0
    profiles: ['ai']
    environment:
      DOCLING_SERVE_ENABLE_UI: '1'
    ports:
      - '${DOCLING_PORT:-5001}:5001'
    volumes:
      - docling_cache:/root/.cache

volumes:
  object_storage_data:
  postgres_data:
  nuget_packages:
  web_node_modules:
  docling_cache:
  ai_data_protection_keys:
